
{% extends 'administration/uses/ blank.html' %}
{% load static %}


{% block page %}

<!-- Start Contentbar -->    
<div class="contentbar">                
    <!-- Start row -->
    <div class="row">
        <!-- Start col -->
        <div class="col-lg-12">
            <div class="card m-b-30">
                
                <div class="card-body">
                    <h6 class="card-subtitle">Exportez les données vers Copy, CSV, Excel & Note.</h6>
                    <div class="table-responsive">
                        <table id="datatable-buttons" class="table table-striped table-bordered">
                        <thead>
                            <tr>
                             
                                <th>Code</th>
                                <th>Nom & rénoms</th>
                             
                                <th>Note1</th>
                                <th>Note2</th>
                                <th>Note3</th>
                                <th>Partiel</th>
                              
                              
                                
                            </tr>
                        </thead>
                        <tbody>
                            {% for etudiant in etudiants %}
                            <tr>
                             
                                <td>{{etudiant.id}}</td>
                                <td>{{etudiant.etudiant}}</td>
                               
                                <td></td>
                                <td></td>
                                <td></td>
                                <td></td>
                             
                            </tr>
                            {% endfor %}
                        </tbody>
</table>
</div>
</div>
</div>
</div>
<!-- End col -->
</div>
<!-- End row -->
</div>

{% endblock page %}
