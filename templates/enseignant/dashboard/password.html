{% extends 'administration/uses/ blank.html' %}
{% load static %}


{% block page %}

<!-- Start Contentbar -->    
<div class="contentbar">                
    <!-- Start row -->
    <div class="row">
        <!-- Start col -->
        <div class="col-lg-12">
            <div class="card m-b-30">
                
                <div class="card-body">
                    <section class="edu-section-gap contact-form-area">
                        <div class="container">
                            <div class="row justify-content-center">
                               
                    
                            {% if messages %}
                            <br>
                            {% for message in messages %}
                                <div class="container alert {% if message.tags %}{{ message.tags }}{% endif %}" id="myAlert" role="alert">
                                    {{ message }}
                                </div>
                            {% endfor %} 
                        {% endif %}
                                <div class="col-lg-8">
                                    <div class="contact-form">
                                        <div class="section-title section-center">
                                            <h3 class="title">Modifier mon mot de passe</h3>
                                        </div>
                                        <form class="rnt-contact-form" id="" method="POST" action="{% url 'teachers_password' %}">
                                            {% csrf_token %}
                                            <div class="row row--10">
                                                <div class="form-group col-lg-6">
                                                    <input class="form-control" type="password" name="old_password" id="old_password_id" placeholder="Ancien mot de passe">
                                                </div>
                                                <div class="form-group col-lg-6">
                                                    <input class="form-control" type="password" name="new_password1" id="new_password1" placeholder="Nouveau Mot de passe">
                                                </div>
                                                <div class="form-group col-12">
                                                    <input class="form-control" type="password" name="new_password2" id="new_password2" placeholder="Confirmez le nouveau mot de passe">
                                                </div>
                    
                                                <div class="custom-control custom-checkbox text-left">
                                                    <input type="checkbox" onclick="myFunction()" class="custom-control-input" id="rememberme">
                                                    <label class="custom-control-label font-14" for="rememberme">Afficher le mot de passe</label>
                                                  </div> 
                                              
                                                <div class="form-group col-12 text-center">
                                                    <button class="btn btn-info" name="submit" type="submit">Modifier<i class="icon-4"></i></button>
                                                </div>
                                            </div>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </section>
                </div>
            </div>
        </div>
        <!-- End col -->
    </div>
    <!-- End row -->
</div>
<script>
    function myFunction() {
        var x = document.getElementById("old_password_id");
        var y = document.getElementById("new_password1");
        var z = document.getElementById("new_password2");
        if (x.type === "password") {
          x.type = "text";
        } else {
          x.type = "password";
        }
        if (y.type === "password") {
          y.type = "text";
        } else {
          y.type = "password";
        }
        if (z.type === "password") {
          z.type = "text";
        } else {
          z.type = "password";
        }
      }
</script>

{% endblock page %}
