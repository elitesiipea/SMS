{% extends 'administration/uses/ blank.html' %}
{% load static %}



{% block page %}
<!-- Start Contentbar -->    
<div class="contentbar">
    <!-- Start row -->
    <div class="row">
        <!-- End col -->
        <div class="col-lg-12">
            <div class="card m-b-30">
                <div class="card-body">
                        <form method="post"  id="contratForm" enctype="multipart/form-data">
                            {% csrf_token %}
                                    <h4>1- INFORMATIONS DE BASE</h4>
                                   
                                    <div class="row">
                                        {% for field in form %}
                                            <div class="form-group col-4">
                                                {{ field.label_tag }}
                                                {{ field }}
                                            </div>
                                        {% endfor %}
                                    </div>
                                    <br>
                                    <button type="submit" class="btn btn-success btn-md btn-block font-18">Enregistrer le dossier</button>
                            </form>                          
                </div>
            </div>
        </div>  
    </div> 
    <!-- End row -->
</div>
<!-- End Contentbar -->
<!-- Start Footerbar -->
        
{% endblock page %}
