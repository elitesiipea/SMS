{% extends 'etudiants/dashboard/components/base.html' %}

{% load static %}
{% block content %}

<div class="edu-team-details-area section-gap-equal" style="margin-top: -150px;">
    <div class="container">
        <div class="row row--40">
           
            <div class="col-lg-12">
                <div class="team-details-content">
                    <div class="main-info">
                        <span class="subtitle">Ecrivez Nous</span>
                    </div>

                    <!-- Display messages (success or error) -->
                    {% if messages %}
                        <div class="alert alert-info">
                            {% for message in messages %}
                                <p>{{ message }}</p>
                            {% endfor %}
                        </div>
                    {% endif %}

                    <!-- Form for writing the email -->
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="subject">Objet :</label>
                            <input type="text" name="subject" id="subject" class="form-control" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Votre Email :</label>
                            <input type="email" name="email" id="email" disabled class="form-control" value="{{ user.email }}">
                        </div>

                        <div class="form-group">
                            <label for="contact">Contact :</label>
                            <input type="tel" name="contact" id="contact" class="form-control">
                        </div>

                        <div class="form-group">
                            <label for="message">Message :</label>
                            <textarea name="message" id="message" rows="6" class="form-control" required></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary">Envoyer</button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

{% endblock content %}
