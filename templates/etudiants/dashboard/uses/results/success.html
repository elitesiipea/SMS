{% extends 'etudiants/dashboard/components/base.html' %}
{% load static %}
{% block content %}

        <!--=====================================-->
        <!--=     Comming Soon Area Start       =-->
        <!--=====================================-->
        <section class="coming-soon-page-area ">
            <div class="container">
                <div class="coming-soon-content">
                    <h1 class="title">Coming Soon</h1>
                    <div class="coming-countdown"></div>
                    <div class="input-group">
                        <input type="email" class="form-control" placeholder="Enter your email address">
                        <button class="edu-btn btn-medium" type="button">Subscribe <i class="icon-4"></i></button>
                    </div>
                </div>
            </div>
            <ul class="shape-group">
                <li class="shape-1 scene">
                    <img data-depth="2" src="{% static 'etudiant/assets/images/others/shape-22.png' %}" alt="Shape">
                </li>
                <li class="shape-2 scene">
                    <img data-depth="-2" src="{% static 'etudiant/assets/images/others/shape-23.png' %}" alt="Shape">
                </li>
                <li class="shape-3">
                    <img class="rotateit" src="{% static 'etudiant/assets/images/others/shape-24.png' %}" alt="Shape">
                </li>
                <li class="shape-4"></li>
            </ul>
        </section>

    </div>

    <div class="rn-progress-parent">
        <svg class="rn-back-circle svg-inner" width="100%" height="100%" viewBox="-1 -1 102 102">
            <path d="M50,1 a49,49 0 0,1 0,98 a49,49 0 0,1 0,-98" />
        </svg>
    </div>

{% endblock content %}
