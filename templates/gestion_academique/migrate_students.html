{% extends 'administration/uses/ blank.html' %}
{% load static %}

{% block page %}
  <!-- Start Contentbar -->    
  <div class="contentbar">                
    <!-- Start row -->
    <div class="container">
      <!-- Start col -->
      <div class="col-lg-12">
     
        <h3>Migration de Classe</h3>
        <br>
        <form method="post" class="move-students-form">
          {% csrf_token %}
          
          <div class="form-group">
              <label for="selected_class">Selectionner la classe :</label>
              <select name="selected_class" id="selected_class" class="form-control">
                  {% for class in classes %}
                      <option value="{{ class.id }}">{{ class.nom }} {{ class.filiere }} {{ class.niveau }} ({{ class.nb_etudiant }})</option>
                  {% endfor %}
              </select>
          </div>
      
          <div class="form-group">
              <label for="num_to_migrate">Nombre d'étudiant à Déplacer :</label>
              <input type="number" required name="num_to_migrate" id="num_to_migrate" class="form-control" min="1">
          </div>
      
          <div class="form-group">
              <button class="btn btn-success" type="submit">Deplacer</button>
          </div>
      </form>
      

      </div>
      <!-- End col -->
    </div>
    <!-- End row -->
  </div>
  <!-- End Contentbar -->


{% endblock page %}
