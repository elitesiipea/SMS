{% extends 'administration/uses/ blank.html' %}
{% load static %}

{% block page %}
  <!-- Start Contentbar -->    
  <div class="contentbar">                
    <!-- Start row -->
    <div class="container">
      <!-- Start col -->
      <div class="col-lg-12">
     
       <!-- your_template.html -->
       <form method="post" action="{% url 'move_uto_other_class_students' %}" class="migration-form">
        {% csrf_token %}
      
        <div class="form-group">
          <label for="source_class">Classe de Départ:</label>
          <select name="source_class" class="form-control">
            {% for classe in classes %}
              <option value="{{ classe.id }}">{{ classe }} ({{ classe.nb_etudiant }})</option>
            {% endfor %}
          </select>
        </div>
      
        <div class="form-group">
          <label for="destination_class">Classe d'arrivée :</label>
          <select name="destination_class" class="form-control">
            {% for classe in classes %}
              <option value="{{ classe.id }}">{{ classe }} ({{ classe.nb_etudiant }})</option>
            {% endfor %}
          </select>
        </div>
      
        <div class="form-group">
          <label for="num_to_migrate">Nombre d'étudiants à déplacer :</label>
          <input type="number" name="num_to_migrate" class="form-control" required>
        </div>
      
        <button type="submit" class="btn btn-primary">Migrate Students</button>
      </form>
      

      </div>
      <!-- End col -->
    </div>
    <!-- End row -->
  </div>
  <!-- End Contentbar -->


{% endblock page %}
